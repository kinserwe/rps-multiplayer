services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    container_name: rps-backend
    restart: always
    depends_on:
      - db
      - redis
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    ports:
      - "3000:80"
    container_name: rps-frontend
    restart: always
    depends_on:
      - backend
  db:
    image: postgres:17.9-alpine
    container_name: rps-psql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rps"]
      interval: 3s
      timeout: 3s
      retries: 5
    env_file:
      - ./backend/.env
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:8.6.3-alpine
    container_name: rps-redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
